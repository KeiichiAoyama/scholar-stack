spring.application.name=application
research-dashboard.scopus.api-key=${SCOPUS_API_KEY:}
research-dashboard.scopus.inst-token=${SCOPUS_INST_TOKEN:}
research-dashboard.http.user-agent=Mozilla/5.0 (compatible; ResearchDashboard/1.0)
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/scholarstack?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Bangkok}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Bangkok
spring.servlet.multipart.max-file-size=25MB
spring.servlet.multipart.max-request-size=25MB
